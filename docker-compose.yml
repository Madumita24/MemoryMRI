version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    volumes:
      - ./:/workspace
    command: bash -lc "pip install -e .[dev] && python -m memory_mri.cli.main --database-url sqlite:////workspace/artifacts/memory_mri.db --artifact-path /workspace/artifacts/baseline-summary.json"
